<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Записаться — Ольга Розет</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
           color: #1a1a1a; background: #fff; }
    .page { max-width: 420px; margin: 0 auto; padding: 3rem 1.5rem 2rem; }
    h1 { font-size: 1.3rem; text-align: center; font-weight: 600; }
    .sub { text-align: center; color: #777; margin: .3rem 0 1.5rem; font-size: .95rem; }
    
    .slots { margin-bottom: 1.5rem; }
    .day { margin-bottom: .8rem; }
    .day-label { font-size: .85rem; color: #999; margin-bottom: .25rem; }
    .t { display: inline-block; padding: .35rem .9rem; margin: .15rem;
         border: 1px solid #e0e0e0; border-radius: 2rem; cursor: pointer;
         font-size: .9rem; transition: all .15s; user-select: none; }
    .t:hover { border-color: #999; }
    .t.on { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    
    input { display: block; width: 100%; padding: .7rem .9rem; margin-bottom: .5rem;
            border: 1px solid #e0e0e0; border-radius: .5rem; font-size: .95rem; }
    input:focus { border-color: #1a1a1a; outline: none; }
    
    button { display: block; width: 100%; padding: .8rem; margin-top: .3rem;
             background: #1a1a1a; color: #fff; border: none; border-radius: .5rem;
             font-size: .95rem; font-weight: 500; cursor: pointer; letter-spacing: .03em; }
    button:hover { background: #333; }
    button:disabled { background: #d0d0d0; cursor: default; }
    
    .msg { text-align: center; padding: 1rem; line-height: 1.5; }
    .msg b { display: block; margin-bottom: .3rem; }
    .loading { text-align: center; color: #bbb; padding: 1.5rem 0; font-size: .9rem; }
    .back { text-align: center; margin-top: 2rem; }
    .back a { color: #aaa; font-size: .85rem; text-decoration: none; }
    .back a:hover { color: #666; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Консультация</h1>
    <p class="sub">40 мин · 15 000 ₽ · онлайн</p>
    
    <div class="slots" id="slots">
      <div class="loading" id="loading">Загрузка расписания...</div>
    </div>
    
    <input id="name" placeholder="Имя">
    <input id="contact" placeholder="Телефон, Telegram или Email">
    <button id="btn" onclick="book()" disabled>Выберите время</button>
    
    <div class="msg" id="msg"></div>
    <p class="back"><a href="/">← Ольга Розет</a></p>
  </div>
  <script src="booking.js"></script>
</body>
</html>
