# ── Plans — entity-plan Spec (subsystem-layer, knowledge/system/specifications/entity-plan.md)
# Plans orchestrate intent + decomposition + outputs + criteria; Plan ⊃ Campaigns + Tasks
# Phase 1: minimal-viable Plan instances; Campaign + Wave bindings populated as subsystems mature.
