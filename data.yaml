# ── System-wide event policy (applies to all Olga's projects) ─────────────────
event_policy:
  accessibility:
    discount_on_request: true
    min_free_slots: 1
    contact: o.g.rozet@gmail.com
    note: "На все проекты Ольги — возможность скидки или бесплатного места по запросу. Минимум 1 бесплатное место в каждом проекте."
  # Class-scoped: applies to events with format containing 'travel' (design tours)
  design_travel:
    payment:
      prepayment_pct: 50
    onboarding:
      interview:
        with: organizers
        mode: online
        duration_short: true
        purpose: "знакомство и обсуждение индивидуальных потребностей"
      intro_meeting:
        with: olgarozet
        modes: [online, offline]
        rule: "оффлайн только дополняет онлайн (онлайн обязательно для всех)"
    value_axes:
      - id: learning
        label: "Обучение"
        description: "экспертный контент, лекции, мастер-классы, авторские маршруты"
      - id: collaboration
        label: "Сотрудничество"
        description: "с Организаторами и между Путешественниками"
      - id: entertainment
        label: "Развлечение"
        description: "пикники, прогулки, локальные события, эстетический отдых"
    note: |
      Общее правило для Дизайн-Путешествий: 50% предоплата.
      Перед каждым Путешествием новый Путешественник проходит короткое онлайн-собеседование
      с Организаторами и участвует во встрече-знакомстве с Ольгой (онлайн обязательно;
      оффлайн при возможности — в дополнение, не вместо).
      Тройная ценность Путешествия: Обучение + Сотрудничество + Развлечение
      одновременно, ни одна ось не доминирует.

