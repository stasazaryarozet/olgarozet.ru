# ── Campaigns — entity-campaign Spec (subsystem-layer, knowledge/system/specifications/entity-campaign.md)
# Campaign promotes target entities through broadcasts; governed by Inv-TXT-utility-on-receipt.
# Phase 1: minimal Campaign instance с plan_id binding; broadcasts + materials populated по мере maturation.
