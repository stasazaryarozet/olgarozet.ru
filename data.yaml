      - 6ebce71683df2a75   # Aug 2025 — «Luxury of Attention» 4-part taxonomy [DN8bdocjDZ3]
      - 1703eea9fc849346   # Dec 2025 — Eileen Gray «Petite Coiffeuse» прототип [DSPgR57Dciz]
      - 0b19b617b5059dcd   # Nov 2025 — Eileen Gray «Coiffeuse E-1027» cabinet dissection [DRXLgjjjJXL] — admin's reference
      - a9fd7404ce3929bd   # Jan 2025 — David Lynch + Surrealism reflection [DFNzrQXNJw-]
      - e479af779f8bf020   # Jul 2025 — Paris-Sept announcement (low-pressure) [DLj8VUhtYi2]
      - 96ca9fcd93dd2c6e   # Aug 2025 — «Paris Sept 2025» 5-lens framing [DNuYeAD0MV2]
