# ── Country → ISO lang code (Inv-SEM-lang-of-parts substrate) ─────────────────
# Resolver in site_generator._build_lang_resolver walks places/locations/people/
# partners → location.country → this map → ISO 639-1 code. Drives <em lang="…">
# wrapping for foreign-language fragments only. host = document language;
# tokens whose resolved lang == host are NOT wrapped (would be redundant noise
# for screen-readers).
# ── Legal block — 152-ФЗ + Schema.org trust signals ────────────────────────
# Owner-side declaration; rendered to footer.legal + cookie-banner gate.
# Empty/missing → no footer-legal + no cookie-banner (silent legacy mode).
# entity.{name,inn,ogrn,address} project to /<entity>/<INN>/<OGRN>/<address>
# bullets in the legal footer; payment.methods are looked up against
# spec.enforcement_data.Inv-SITE-trust-base.payment_labels — fail-loud on
# unknown method to prevent untranslated codes leaking to user-visible HTML.
legal:
  # Privacy policy SoT: knowledge/people/olgarozet/site/privacy.md → /privacy/
  # rendered via site_generator.p_static_page; auto-emitted to <slug>/index.html
  # at site_preview-time and at update_site/update_landing-time. Absolute URL
  # selected for footer.legal cross-host correctness (event-bound landings on
  # parisinseptember.ru reference parisinseptember.ru/privacy/, mirrored repo).
  privacy_url: "https://parisinseptember.ru/privacy/"
  oferta_url:            # admin-fill: договор-оферта not yet drafted
  # 152-ФЗ ст.12 ч.3 — РКН-уведомление о трансгран. передаче ПДн. Consent на форме
  # + это уведомление = формальный базис для иностранного backend (CF Worker /
  # Formspree). Действие оператора (Olga); read by surface_compliance formal_basis.
  rkn_crossborder_notified: false   # admin/Olga-fill: true после подачи уведомления в РКН
  rkn_processing_notified: false    # 152-ФЗ ст.22 — уведомление об обработке ПДн (отдельное)
  entity:
    # admin-fill: ИП / ООО реквизиты Оператора (152-ФЗ ст. 18.1 — подлежат
    # публикации в открытом доступе). Empty strings render as no-op (footer
    # bullets omit absent fields). Fill all four to publish full reqs block.
    name: ""             # «ИП Розет Ольга Геннадьевна»
    inn: ""              # 12-значный ИНН ИП
    ogrn: ""             # 15-значный ОГРНИП
    address: ""          # юр.адрес регистрации
  payment:
    # Платёжные методы листинга мероприятий (Design Travels, Встречи).
    methods: [card, sbp, bank_transfer]
    accepts_currency: [RUB, EUR]
  cookie_consent:
    required: true       # privacy_url set → 152-ФЗ banner emits on first visit
    banner_placement: bottom

