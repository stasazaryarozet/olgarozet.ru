# Booking transport — Apps Script endpoint that ingests reservation form
# submissions into the Google Sheet bound by .state/engage/<owner>/config.json.
# SoT for site_generator.p_booking; fail-loud (no hardcode fallback).
# Mirrors .state/engage/olgarozet/config.json::transport_url.
#
# Availability model (Genius СверхSimplification 2026-05-17):
#   Free slots = virtual_grid(engage.md::slot_generation) ∖ busy(Calendar).
#   Calendar = booked time SoT; Spec = availability pattern SoT.
#   No physical «Возможная Консультация» marker events required —
#   eliminated Apps-Script-era bridge-shim model duplication.
#
# Substrate cascade per Inv-PROV-substrate-diversity (Calendar busy-read):
#   1. oauth_refresh   (Olga's personal Google OAuth)
#   2. service_account (GCP SA via secrets_manager.get_key('google_service_account_calendar'))
# Admin блокирует время через Calendar event (natural Google UX) —
# no manual_yaml override tier needed.
booking:
  transport_url_ref: booking_webhook_url

