  - id: paris-2026-09-promo
    title: "paris-2026-09 promotional arc"
    target_ids: [paris-2026-09]            # entity-campaign Inv-CMP-target-required
    target_kind: event
    plan_id: paris-2026-09-plan            # parent-edge — entity-campaign + entity-plan binding
    timeline:
      start_ts: "2026-03-01T00:00:00+03:00"
      end_ts:   "2026-09-08T00:00:00+03:00"   # promo closes when trip starts
    owners: [azaryarozet, olgarozet, natalia_loginova]
    audience: [architects, designers, decorators, artists]
    surfaces: [landing, telegram_broadcast, instagram_post]
    description: |
      Promotional arc для paris-2026-09 trip — landing parisinseptember.ru +
      Telegram канал «ОЛЬГА РОЗЕТ» + Instagram @olgarozet posts. Каждый
      broadcast carries Inv-TXT-utility-on-receipt: Внимающий получает Пользу
      (factual / insight / aesthetic / orientation / warmth) даже без покупки
      участия. См. exemplars: Eileen Gray Coiffeuse / Petite Coiffeuse cabinet
      dissection (Nov-Dec 2025), 4-part Luxury taxonomy (Aug 2025), 5-lens
