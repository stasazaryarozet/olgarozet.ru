  - id: paris-2026-09
    title: Париж · сентябрь 2026
    t_key: "2026-09-08"
    date: 8–11 сентября
    broadcast: [site]
    web_addresses: [parisinseptember.ru]
    audience: [architects, designers, decorators, artists]
    organizers: [olgarozet, natalia_loginova]
    locations: [paris]
    concept: "100 лет обещаний дизайна и 140 лет Ле Корбюзье"
    format: [travel]
    cohort:
      max: 12
    duration: 4 дня
    status: PLANNING
    pricing:
      team_fee:
        amount: 1550
        currency: EUR
        per: participant
        recipient: team
        note: "та же стоимость, что в январском туре"
      participant_expenses:
        description: "сверх team-fee — оплачивает участник"
        items: [transport_to_paris, accommodation, food]
    lead: "Четыре дня в Париже за два дня до открытия Maison & Objet. Сто лет обещаний дизайна и сто сорок лет Ле Корбюзье — рамка теории и практики. До двенадцати человек, по-русски."
    sections:
      - title: Тема
        intro: "Две взаимозависимые оси под общей рамкой «теория и практика»."
        pairs:
          - label: "100 лет обещаний дизайна"
            text: "что обещали мастера 1920-х — материал, человечность, индивидуальный почерк. Что из обещанного состоялось в XX веке, а что осталось декларацией."
          - label: "140 лет Ле Корбюзье"
            text: "переход от обещаний к канону. Корбюзье как точка консолидации модернистских деклараций в систему."
      # Программа section retired — fully derived from days[] below
      # (Inv-PROJECTION + suppression in p_event_landing). Single SoT.
      - title: Что входит в 1550 €
        items:
          - "информационные материалы и наш путеводитель по Maison & Objet"
          - "вход в музеи и на виллы по программе"
          - "трансфер за город на виллу Алвара Аалто"
          - "мастер-класс у дизайнера интерьера"
          - "экскурсия в «третье место» с приветственным кофе"
      - title: Что не входит
        items:
          - "перелёт до Парижа и обратно"
          - "проживание (помогаем подобрать)"
          - "питание"
          - "виза"
          - "билеты на Maison & Objet и события сверх программы"
      - title: Контекст
        text: "Январский тур «Ар-деко 100 лет» (январь 2026) собрал ту же аудиторию — архитекторов, дизайнеров, декораторов, художников. Сентябрь — следующий шаг той же команды: новая тема, поправленный формат (без группового обхода Maison & Objet — личный темп оказался лучше) и более избирательный маршрут."
    # Internal organizer-side gaps — surfaced to admin/Lumen via System Memory,
    # NOT rendered on public traveler-facing landing (Inv-CONTENT-AUDIENCE).
    internal_questions:
      - to: [olgarozet, natalia_loginova]
        q: "Day 4 — Foundation Le Corbusier в Boulogne-Billancourt или повтор виллы Ла Рош и Apartment Molitor?"
      - to: [olgarozet, natalia_loginova]
        q: "Palais de la Porte Dorée или общественная палата — какой из дворцов входит в Day 1?"
      - to: [olgarozet, natalia_loginova]
        q: "Размещение — какой пакет/режим от Организаторов?"
      - to: [olgarozet, natalia_loginova]
        q: "Состав вернисажей и партнёров Maison & Objet — что включаем по мере готовности?"
    signup:
      title: "Лист ожидания"
      note: "Оставьте email — пришлём финальную программу первыми. Без обязательств."
    contact:
      prompt: "Остался вопрос?"
      text: "Напишите Ольге — ответит лично."
      email: "o.g.rozet@gmail.com"
    about_organizer:
      text: "Программу составляли вдвоём. Ольга Розет — художник, искусствовед, дизайнер интерьеров; ведёт линию темы и сборки. Наталья Логинова — Организатор Парижских Дизайн-Путешествий, постоянно живёт в Париже; ведёт практику пространства и партнёрский маршрут."
      link_text: "olgarozet.ru"
      link_url: "https://olgarozet.ru/"
    # Internal program notes (not rendered on public landing — used for
    # admin/operational reference and as source for Naталья's voice 185+186
    # diarized cross-check).
    # days[].notes — public, traveler-facing prose (Inv-CONTENT-AUDIENCE).
    # Internal organisational notes live in
    # knowledge/projects/paris-2026/paris-sep-2026-program-2026-04-30.md.
    days:
      - day: 1
        date: "8 сентября"
        theme: "Третье место и Ар-деко"
        notes: "Утром встречаемся в современном «третьем месте» — это не коворкинг и не кафе: пространство с парижскими крышами в окнах, где работают, пьют кофе, разговаривают. За кофе — вводная лекция «Сто лет обещаний»: маркёры главных дизайн-событий столетия, не сухая хроника. Здесь же отдельно проговариваем Maison & Objet: маршрут устроен так, чтобы каждый прошёл выставку самостоятельно по нашим рекомендациям — групповой обход в январе показал, что личный темп лучше. После обеда — Музей декоративного искусства и президентский магазин Pierre Paulin: тот же дизайнер делал интерьеры в Елисейском дворце для Помпиду (1971) и для Миттерана (1984), редкий случай для французской политики. Вечером — наши рекомендации по предвыставочным вернисажам."
      - day: 2
        date: "9 сентября"
        theme: "Корбюзье и дизайн-прогулка по Маре"
        notes: "Утро — Ле Корбюзье в двух точках: вилла Ла-Рош и его собственная квартира на улице Молитор. После обеда — авторская дизайн-прогулка по Маре: офис Ренцо Пьяно (Прицкеровская премия) — со двора и через витрины; Архивы Nationales с интерьерами и внутренним двором; Dover Street Market и Uniqlo, занявшие исторические здания; корейские концепт-магазины оптики с роботами и гигантскими лицами в витринах. Рамка дня — «дорогой модернизм»."
      - day: 3
        date: "10 сентября"
        theme: "Аалто и мастер-класс"
        notes: "Утром выезжаем за город к вилле Алвара Аалто — сад со скульптурами и современным искусством, при хорошей погоде пикник на месте. Возвращаемся в Париж раньше — на мастер-класс к Ирине Маркман: её парижская квартира сейчас в реновации, наглядный разговор о том, как соединять наследие с современными вещами в живом пространстве."
      - day: 4
        date: "11 сентября"
        theme: "Корбюзье как сборка"
        notes: "Финальные точки Ле Корбюзье — две локации, замыкающие тему столетия. На следующий день открывается Maison & Objet: для тех, кто остаётся в Париже, у нас готов отдельный путеводитель по неделе дизайна — но опять же не группой, каждый своим маршрутом."
    registration: null
    lines:
      - "100 лет"
      - "обещаний дизайна"
      - ""
      - "Корбюзье —"
      - "140 лет"
      - ""
      - "С Натальей Логиновой"

