# ── System-wide event policy (applies to all Olga's projects) ─────────────────
event_policy:
  accessibility:
    discount_on_request: true
    min_free_slots: 1
    contact: o.g.rozet@gmail.com
    note: "На все проекты Ольги — возможность скидки или бесплатного места по запросу. Минимум 1 бесплатное место в каждом проекте."
  # Class-scoped: applies to events with format containing 'travel' (design tours)
  design_travel:
    payment:
      prepayment_pct: 50
    note: "Общее правило для Дизайн-Путешествий: 50% предоплата."

# ── Event series — shared format/program for series of related events ─────────
event_series:
  meeting_chelovek_remeslo:
    name: "Встречи с Ольгой"
    program:
      - kind: talk
        by: olgarozet
        topic_source: [design_travels, field_scouting]
        description: "Доклад Ольги на тему, обычно связанный в т.ч. с результатами наблюдений в дизайн-путешествиях и собственных вылазках"
      - kind: dialogue
        with: olgarozet
        type: professional
        description: "Профессиональное общение с Ольгой"
      - kind: networking
        among: participants
        description: "Нетворкинг участников друг с другом"
    online_prep:
      encouraged: true
      recommendations:
        - "Подготовиться к событию заранее"
        - "Выделить место-время"
        - "Приготовить себе еду"

