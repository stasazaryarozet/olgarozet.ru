  - id: paris-2026-09-plan
    title: "Paris September 2026 — Дизайн-Путешествие arc"
    intent: |
      Successfully run paris-2026-09 Дизайн-Путешествие 8-11 sентября 2026 с
      cohort до 10 человек, 1600€ team-fee, авторская программа Olga + Natalia
      (paritet'ные Организаторы), ethical broadcast (Inv-TXT-utility-on-receipt)
      по всему promo-arc'у март-август 2026. Онлайн-презентация программы
      (IG-Live с обеими, среда; ZOOM в августе) — knowledge transfer + relationship
      building с potential Путешественниками.
    status: active     # entity-plan status_taxonomy
    temporal:
      start_ts: "2026-03-01T00:00:00+03:00"   # promo-arc opens
      end_ts:   "2026-09-11T23:59:59+03:00"   # trip closes Day 4 ужин
      milestones:
        - { ts: "2026-05-13T19:00:00+03:00", label: "Онлайн-презентация — прямой эфир с Ольгой и Натальей (Instagram Live, канал Натальи Логиновой), 19:00 МСК" }
        - { ts: "2026-08-24T19:00:00+03:00", label: "Онлайн-презентация — ZOOM (август 2026, дата уточняется; не публикуем пока)" }
        - { ts: "2026-09-08T09:00:00+03:00", label: "Day 1 — Система вкуса" }
        - { ts: "2026-09-09T09:00:00+03:00", label: "Day 2 — Дорогой модернизм" }
        - { ts: "2026-09-10T09:00:00+03:00", label: "Day 3 — Человеческий модернизм + Маркман master-class" }
        - { ts: "2026-09-11T09:00:00+03:00", label: "Day 4 — Искусство и дизайн + Итоги" }
    owners: [azaryarozet, olgarozet, natalia_loginova]
    decomposition: []   # subsystem-tasks Task-id list — Phase 2: walk knowledge/system/tasks/<tid>.md
    outputs:
      - { kind: event,    id: paris-2026-09 }                  # main travel-event
      - { kind: event,    id: paris-2026-09-ig-live }          # publicly-announced online-presentation (IG Live)
