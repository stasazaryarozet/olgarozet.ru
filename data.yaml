      - { class: time,  duration_min: 5760, role: trip_duration }   # 4 days × 24 hours × 60 min
    audience: [architects, designers, decorators, artists]
    success_criteria:
      - "≥ 6 confirmed cohort registrations (60% of cap=10)"
      - "Revenue ≥ 9 600 € (6 × 1600€)"
      - "Inv-TXT-utility-on-receipt ✓ across все promotional broadcasts"
      - "Все 4 venue-bookings confirmed by 2026-08-15: Maison La Roche, Apt Molitor (Wed-resolved), Maison Louis Carré (Thu-private), Маркман master-class"
