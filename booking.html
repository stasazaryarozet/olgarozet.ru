<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Записаться — Ольга Розет</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .booking{max-width:500px;margin:2rem auto;padding:0 1.5rem}
    .booking h2{text-align:center;margin-bottom:.5rem}
    .booking>p{text-align:center;color:#666}
    .slots{margin:1.5rem 0}
    .day{margin:1rem 0}
    .day h3{font-size:.9rem;color:#888;margin-bottom:.3rem}
    .slot{display:inline-block;padding:.4rem 1rem;margin:.2rem;border:1px solid #ddd;border-radius:.4rem;cursor:pointer;font-size:.95rem}
    .slot:hover,.slot.picked{background:#111;color:#fff;border-color:#111}
    .fields{margin:1rem 0}
    .fields input{width:100%;padding:.7rem;border:1px solid #ddd;border-radius:.4rem;font-size:1rem;margin-bottom:.5rem}
    .fields input:focus{border-color:#333;outline:none}
    .btn{display:block;width:100%;padding:.75rem;background:#111;color:#fff;border:none;border-radius:.5rem;font-size:1rem;cursor:pointer;margin-top:.5rem}
    .btn:hover{background:#333}
    .btn:disabled{background:#ccc;cursor:default}
    .msg{text-align:center;margin-top:1rem;color:#666}
    .back{text-align:center;margin-top:2rem}.back a{color:#666}
    #loading{text-align:center;color:#999}
  </style>
</head>
<body>
<div class="booking">
  <h2>Консультация</h2>
  <p>40 мин · 15 000 ₽ · онлайн</p>
  <div id="loading">Загрузка свободных окон...</div>
  <div class="slots" id="slots" style="display:none"></div>
  <div class="fields" id="fields" style="display:none">
    <input id="name" placeholder="Имя" required>
    <input id="contact" placeholder="Телефон, Telegram или Email" required>
    <button class="btn" id="btn" onclick="book()" disabled>Выберите время</button>
  </div>
  <div class="msg" id="msg"></div>
  <p class="back"><a href="/">← Назад</a></p>
</div>
<script>
var API='https://script.google.com/macros/s/AKfycbzeulk8nVhROOmrnysLKRLGqM_naMEgVhtPl50ch_GCilibJ7MXv2rWlGlq1hz1SWc/exec';
var picked=null;
fetch(API+'?action=slots',{mode:'cors'}).then(r=>r.json()).then(function(d){
  document.getElementById('loading').style.display='none';
  var el=document.getElementById('slots');
  el.style.display='block';
  document.getElementById('fields').style.display='block';
  var days={};
  var wd={пн:'Понедельник',вт:'Вторник',ср:'Среда',чт:'Четверг',пт:'Пятница'};
  d.slots.forEach(function(s){if(!days[s.date])days[s.date]=[];days[s.date].push(s)});
  var html='';
  for(var date in days){
    var s=days[date][0];
    var parts=date.split('-');
    html+='<div class="day"><h3>'+(wd[s.weekday]||s.weekday)+', '+parseInt(parts[2])+'.'+parts[1]+'</h3>';
    days[date].forEach(function(s){
      html+='<span class="slot" onclick="pick(this,\''+s.date+'\',\''+s.time+'\')">'+s.time+'</span>';
    });
    html+='</div>';
  }
  el.innerHTML=html||'<p>Нет свободных окон</p>';
}).catch(function(){
  document.getElementById('loading').textContent='Не удалось загрузить';
});
function pick(el,date,time){
  document.querySelectorAll('.slot').forEach(function(s){s.classList.remove('picked')});
  el.classList.add('picked');
  picked={date:date,time:time};
  document.getElementById('btn').disabled=false;
  document.getElementById('btn').textContent=time+' — Записаться';
}
function book(){
  var name=document.getElementById('name').value;
  var contact=document.getElementById('contact').value;
  if(!name||!contact||!picked)return;
  document.getElementById('btn').disabled=true;
  document.getElementById('btn').textContent='Отправка...';
  var url=API+'?name='+encodeURIComponent(name)+'&contact='+encodeURIComponent(contact)+'&date='+picked.date+'&time='+picked.time;
  fetch(url,{mode:'no-cors'}).then(function(){
    document.getElementById('msg').textContent='Записано на '+picked.time+'! Ольга свяжется с вами.';
    document.getElementById('fields').style.display='none';
    document.getElementById('slots').style.display='none';
  });
}
</script>
</body>
</html>
