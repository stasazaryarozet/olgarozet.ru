<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Записаться — Ольга Розет</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .booking { max-width: 400px; margin: 2rem auto; padding: 0 1.5rem; }
    .booking h2 { text-align: center; margin-bottom: 0.5rem; }
    .booking p { text-align: center; color: #666; }
    .field { margin: 1rem 0; }
    .field input { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 0.5rem; font-size: 1rem; }
    .field input:focus { border-color: #333; outline: none; }
    .submit { text-align: center; margin-top: 1.5rem; }
    .submit button { padding: 0.75rem 2rem; background: #111; color: #fff; border: none;
      border-radius: 0.5rem; font-size: 1rem; cursor: pointer; }
    .submit button:hover { background: #333; }
    .msg { text-align: center; margin-top: 1rem; color: #666; }
    .back { text-align: center; margin-top: 2rem; }
    .back a { color: #666; }
  </style>
</head>
<body>
  <div class="booking">
    <h2>Консультация</h2>
    <p>40 мин · 15 000 ₽ · онлайн</p>
    <form id="f" onsubmit="send(event)">
      <div class="field"><input name="name" placeholder="Имя" required></div>
      <div class="field"><input name="contact" placeholder="Телефон, Telegram или Email" required></div>
      <div class="submit"><button type="submit">Записаться</button></div>
    </form>
    <div class="msg" id="msg"></div>
    <p class="back"><a href="/">← Назад</a></p>
  </div>
  <script>
    function send(e) {
      e.preventDefault();
      var f = document.getElementById('f');
      var d = {name: f.name.value, contact: f.contact.value};
      var url = 'https://script.google.com/macros/s/AKfycbzeulk8nVhROOmrnysLKRLGqM_naMEgVhtPl50ch_GCilibJ7MXv2rWlGlq1hz1SWc/exec?' + new URLSearchParams(d).toString();
      document.getElementById('msg').textContent = 'Отправка...';
      fetch(url, {mode:'no-cors'}).then(function(){
        document.getElementById('msg').textContent = 'Спасибо! Ольга свяжется с вами.';
        f.reset();
      });
    }
  </script>
</body>
</html>
